<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CLMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* Background tổng thể (Màu tím gradient) */
        body {
            background: linear-gradient(135deg, #4e2270 0%, #8b3fa0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Khung Card chính */
        .card {
            width: 400px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            position: relative;
            z-index: 10;
        }

        /* Nửa trên của Card (Màu tím) */
        .card-top {
            background: linear-gradient(to bottom, rgba(150, 72, 202, 0.9), rgba(139, 21, 172, 0.9));
            padding: 40px 30px;
            color: white;
            position: relative;
        }

        .card-top h2 { font-size: 22px; margin-bottom: 10px; font-weight: 500; }
        .card-top p { font-size: 11px; opacity: 0.8; margin-bottom: 30px; line-height: 1.5; }
        .card-top a.create-acc { color: white; text-decoration: none; font-size: 13px; font-weight: 500; }
        .card-top a.create-acc:hover { text-decoration: underline; }

        /* Nửa dưới của Card (Màu trắng) */
        .card-bottom {
            background: #fdfdfd;
            padding: 30px;
            text-align: center;
        }

        .card-bottom h3 {
            color: #6a2c91;
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Khung nhập liệu có chứa Icon */
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 14px;
        }

        /* Style cho ô input (Màu tím nhạt, bo tròn) */
        .input-group input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: none;
            border-radius: 25px;
            background: #9e75b8; /* Tím nhạt giống ảnh */
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        
        .input-group input::placeholder { color: rgba(255, 255, 255, 0.8); }
        .input-group input:focus { background: #8e62a8; }

        /* Các tùy chọn Remember & Forgot Password */
        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #6a2c91;
            margin: 20px 0;
            padding: 0 10px;
        }

        .options a { color: #6a2c91; text-decoration: none; }
        .options a:hover { text-decoration: underline; }

        /* Nút đăng nhập */
        button {
            background: #8b3fa0;
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        
        button:hover { background: #6a2c91; }

        /* CSS tạo hiệu ứng sao chổi (trang trí thêm cho ngầu) */
        .shooting-star {
            position: absolute; width: 2px; height: 2px; background: white; border-radius: 50%;
            box-shadow: 0 0 10px 2px white; animation: falling 3s infinite linear; opacity: 0;
        }
        .shooting-star::before { content: ''; position: absolute; top: 50%; transform: translateY(-50%); width: 30px; height: 1px; background: linear-gradient(90deg, white, transparent); }
        @keyframes falling {
            0% { transform: translate(100vw, -50vh) rotate(45deg); opacity: 1; }
            100% { transform: translate(-50vw, 100vh) rotate(45deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="shooting-star" style="top: 10%; left: 80%; animation-delay: 0s;"></div>
    <div class="shooting-star" style="top: 30%; left: 60%; animation-delay: 1.5s;"></div>

    <div class="card">
        <div class="card-top">
            <h2>Welcome to CLMS</h2>
            <p>Hệ thống giám sát vị trí trẻ em thông minh. Đảm bảo an toàn cho gia đình bạn với công nghệ theo dõi thời gian thực.</p>
            <a href="/register" class="create-acc">Create Account</a>
        </div>

        <div class="card-bottom">
            <h3>USER LOGIN</h3>
            <form action="/login" method="POST">
                
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Username" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <div class="options">
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="checkbox" checked style="accent-color: #6a2c91;"> Remember
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit">LOGIN</button>
                
            </form>
        </div>
    </div>

</body>
</html>
