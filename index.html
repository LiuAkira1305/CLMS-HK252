<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống theo dõi trẻ em - HCMUT</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }
        .header { background: #007bff; color: white; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { padding: 20px; }
        /* Khung chứa Dashboard */
        .dashboard-frame {
            width: 100%;
            height: 80vh; /* Chiều cao chiếm 80% màn hình */
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Child Location Tracker</h1>
        <p>Advanced Software Engineering - Group 3</p>
    </div>

    <div class="container">
        <iframe 
            class="dashboard-frame" 
            src="https://app.arduino.cc/dashboards/b44eb70c-7792-42f9-a6c6-3937b1e8f509?embed" 
            allow="geolocation">
        </iframe>
    </div>

</body>
</html>
